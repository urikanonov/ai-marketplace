name: New plugin or skill idea
description: Propose a brand-new plugin or skill for this marketplace (the maintainer authors new plugins).
title: "[Plugin idea]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to suggest a **brand-new** plugin or skill. New plugins are authored by the maintainer
        to keep every plugin under a single, supportable authorship, so please describe the idea here rather
        than opening a pull request that adds a plugin. To improve a plugin that already exists, use the
        "Feature request" form instead.
  - type: input
    id: name
    attributes:
      label: Proposed name
      description: A short kebab-case name for the plugin or skill.
      placeholder: e.g. pr-summarizer
    validations:
      required: false
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do, and what is painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should the plugin or skill do, and when should it run? If it is a skill, when should the model trigger it?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or workarounds
      description: Anything you already tried or considered.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this has not already been requested.
          required: true
