name: Feature request
description: Request an enhancement or new capability for a plugin that already exists in this marketplace.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request an improvement or a new capability for a plugin that **already exists** in
        this marketplace. To propose a brand-new plugin or skill, use the "New plugin or skill idea" form
        instead.
  - type: input
    id: plugin-name
    attributes:
      label: Plugin name
      description: Which plugin should this improve? Use the exact name shown by `copilot plugin list`.
      placeholder: e.g. commentable-html
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      description: The version you are on. Find it with `copilot plugin list` or in the plugin's plugin.json.
      placeholder: e.g. 1.3.0
    validations:
      required: false
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do, and what is painful or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should the plugin do, and when should it run? If it is a skill, when should the model trigger it?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: What would success look like?
      description: How would you know this is done? List the behavior or acceptance criteria you expect.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or workarounds
      description: Anything you already tried or considered.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this has not already been requested.
          required: true
        - label: I am on the latest version of the plugin (`copilot plugin update <name>`).
          required: false
