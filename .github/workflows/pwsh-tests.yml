name: pwsh-tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  pwsh-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run auto-updater hook tests
        shell: pwsh
        run: pwsh -NoProfile -File plugins/urikan-ai-marketplace-auto-updater/dev/tests/updater.Tests.ps1
      - name: Run watch-pr-github decision-logic tests
        shell: pwsh
        run: pwsh -NoProfile -File .github/skills/watch-pr-github/tests/decision.Tests.ps1
