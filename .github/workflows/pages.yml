name: pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege. The site is generated and tested in the unprivileged `build` job; only the
# `deploy` job holds the Pages/OIDC scopes, and it runs nothing but the GitHub-owned Pages
# actions on the artifact `build` already produced - it checks out no repo code, so merged code
# never executes where a deploy token can be minted.
permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Required PR gate, and the producer of the Pages artifact. It regenerates the site
  # (`--check` on PRs, full regen otherwise), runs the generator unit tests, uploads the artifact,
  # then runs the browser smoke suite. The artifact is uploaded BEFORE the smoke suite so that a
  # smoke failure does not withhold the artifact from deploy (tests do not gate the deploy), while
  # a generator/unit failure happens first and does withhold it (a broken generator is not shipped).
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Verify committed site data is fresh (pull requests)
        if: github.event_name == 'pull_request'
        run: python scripts/build_site_data.py --check
      - name: Regenerate site data from source (non-PR)
        if: github.event_name != 'pull_request'
        run: python scripts/build_site_data.py
      - name: Run site generator unit tests
        run: python -m unittest discover -s scripts -p "test_build_site_data.py"
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site
      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tests/site/package-lock.json
      - name: Install test dependencies (no lifecycle scripts)
        working-directory: tests/site
        run: npm ci --ignore-scripts
      - name: Resolve Playwright cache key inputs
        id: pw
        working-directory: tests/site
        shell: bash
        run: |
          set -euo pipefail
          node -e 'process.stdout.write("version=" + require("@playwright/test/package.json").version + "\n")' >> "$GITHUB_OUTPUT"
          echo "imageos=${ImageOS:-$RUNNER_OS}" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browser
        id: pwcache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw.outputs.imageos }}-${{ runner.arch }}-chromium-${{ steps.pw.outputs.version }}
      - name: Install Playwright browser and system deps (cache miss)
        if: steps.pwcache.outputs.cache-hit != 'true'
        working-directory: tests/site
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps only (cache hit)
        if: steps.pwcache.outputs.cache-hit == 'true'
        working-directory: tests/site
        run: npx playwright install-deps chromium
      - name: Run site smoke tests
        working-directory: tests/site
        run: npm test

  # Privileged publish. It consumes the artifact `build` produced and runs only GitHub-owned Pages
  # actions - no checkout, no repo code - so the deploy token is never exposed to merged code. It
  # runs even when `build` fails its smoke suite (`!cancelled()`), so a failing or flaky test never
  # skips the deploy; if `build` fails before uploading the artifact, deploy-pages fails loudly and
  # `notify` fires.
  deploy:
    needs: build
    if: ${{ !cancelled() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          enablement: true
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  # Alert if the pipeline fails on main (build or deploy, including workflow_dispatch runs and
  # cancellations), so a broken build or a failed deploy never silently leaves the site wrong.
  # Opens a tracking issue, or comments on the open one, distinguishing a stale site (deploy failed)
  # from a deployed-but-regressed site (build failed after the artifact was uploaded).
  notify:
    needs: [build, deploy]
    if: ${{ always() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && (contains(fromJSON('["failure", "cancelled"]'), needs.build.result) || contains(fromJSON('["failure", "cancelled"]'), needs.deploy.result)) }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or update the failure issue
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        with:
          script: |
            const title = "Pages workflow failed on main";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const buildResult = process.env.BUILD_RESULT;
            const deployResult = process.env.DEPLOY_RESULT;
            const deployBad = deployResult === "failure" || deployResult === "cancelled";
            const impact = deployBad
              ? "The deploy did not complete, so the published site may be stale."
              : "The deploy completed, but the build job failed after the artifact was uploaded, so the published site may contain a regression that the smoke tests would have caught.";
            const body = [
              `The \`pages\` workflow failed on \`main\` (build: ${buildResult}, deploy: ${deployResult}).`,
              ``,
              impact,
              ``,
              `- Commit: ${context.sha}`,
              `- Run: ${runUrl}`,
              ``,
              `Re-run the workflow (Actions -> pages -> Run workflow) or push a fix.`,
            ].join("\n");
            try {
              const open = await github.paginate(github.rest.issues.listForRepo, {
                owner, repo, state: "open", per_page: 100,
              });
              const existing = open.find((i) => !i.pull_request && i.title === title);
              if (existing) {
                await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
                return;
              }
            } catch (e) {
              core.warning("Could not scan existing issues, creating a new one: " + e.message);
            }
            await github.rest.issues.create({ owner, repo, title, body });
