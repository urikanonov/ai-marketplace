name: pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege. The site is generated and tested in the unprivileged `site` job; only the
# `deploy` job holds the Pages/OIDC scopes, and it runs nothing but the GitHub-owned Pages
# actions on the artifact `site` already produced - it checks out no repo code, so merged code
# never executes where a deploy token can be minted.
permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Required PR gate, and the producer of the Pages artifact. It regenerates the site
  # (`--check` on PRs, full regen otherwise), runs the generator unit tests, uploads the artifact,
  # then runs the browser smoke suite. The artifact is uploaded BEFORE the smoke suite, but deploy
  # still requires the complete site job to pass.
  site:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Verify committed site data is fresh (pull requests)
        if: github.event_name == 'pull_request'
        run: python scripts/build_site_data.py --check
      - name: Regenerate site data from source (non-PR)
        if: github.event_name != 'pull_request'
        run: python scripts/build_site_data.py
      - name: Run site generator unit tests
        run: python -m unittest discover -s scripts -p "test_build_site_data.py"
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/dist
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      # No npm cache: the tiny dev dependency set installs quickly, and skipping it keeps the
      # lockfile-keyed npm cache out of reach of the repo-controlled test code that runs later.
      - name: Install test dependencies (no lifecycle scripts)
        working-directory: site/tests
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if npm ci --ignore-scripts; then exit 0; fi
            if [ "$attempt" -lt 3 ]; then
              echo "npm ci failed (attempt $attempt of 3), retrying..." >&2
              sleep $((attempt * 5))
            fi
          done
          exit 1
      - name: Resolve Playwright cache key inputs
        id: pw
        working-directory: site/tests
        shell: bash
        run: |
          set -euo pipefail
          node -e 'process.stdout.write("version=" + require("@playwright/test/package.json").version + "\n")' >> "$GITHUB_OUTPUT"
          echo "imageos=${ImageOS:-$RUNNER_OS}" >> "$GITHUB_OUTPUT"
      - name: Restore Playwright browser cache
        id: pwcache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw.outputs.imageos }}-${{ runner.arch }}-chromium-${{ steps.pw.outputs.version }}
      - name: Install Playwright browser and system deps (cache miss)
        if: steps.pwcache.outputs.cache-hit != 'true'
        working-directory: site/tests
        run: npx playwright install --with-deps chromium
      - name: Install Playwright browser (cache hit)
        if: steps.pwcache.outputs.cache-hit == 'true'
        working-directory: site/tests
        run: npx playwright install chromium
      - name: Save Playwright browser cache
        if: steps.pwcache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw.outputs.imageos }}-${{ runner.arch }}-chromium-${{ steps.pw.outputs.version }}
      - name: Run site smoke tests
        working-directory: site/tests
        run: npm test

  # Privileged publish. It consumes the artifact the `site` job produced and runs only GitHub-owned
  # Pages actions - no checkout, no repo code - so the deploy token is never exposed to merged code.
  # A failed smoke suite blocks deploy, so a browser regression is never published.
  deploy:
    needs: site
    if: ${{ needs.site.result == 'success' && github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  # Alert if the pipeline fails on main (the site build or the deploy, including workflow_dispatch
  # runs and cancellations), so a broken build or a failed deploy never silently leaves the site
  # wrong. Opens a tracking issue, or comments on the open one, noting that the published site may
  # be stale because a failed site check now blocks deploy.
  notify:
    needs: [site, deploy]
    if: ${{ always() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && (contains(fromJSON('["failure", "cancelled"]'), needs.site.result) || contains(fromJSON('["failure", "cancelled"]'), needs.deploy.result)) }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or update the failure issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SITE_RESULT: ${{ needs.site.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        with:
          script: |
            const title = "Pages workflow failed on main";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const siteResult = process.env.SITE_RESULT;
            const deployResult = process.env.DEPLOY_RESULT;
            const body = [
              `The \`pages\` workflow failed on \`main\` (site: ${siteResult}, deploy: ${deployResult}).`,
              ``,
              "The deploy did not complete, so the published site may be stale.",
              ``,
              `- Commit: ${context.sha}`,
              `- Run: ${runUrl}`,
              ``,
              `Re-run the workflow (Actions -> pages -> Run workflow) or push a fix.`,
            ].join("\n");
            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: "open", per_page: 100,
            });
            const existing = open.find((i) => !i.pull_request && i.title === title);
            if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title, body });
            }
