name: pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege by default. Only the deploy job is granted the Pages/OIDC scopes,
# so the untrusted npm/browser install and the site tests never run in a job that
# can mint a deploy token.
permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tests/site/package-lock.json
      - name: Verify committed site data is fresh (pull requests)
        if: github.event_name == 'pull_request'
        run: python scripts/build_site_data.py --check
      - name: Regenerate site data from source (deploys)
        if: github.event_name != 'pull_request'
        run: python scripts/build_site_data.py
      - name: Run site generator unit tests
        run: python -m unittest discover -s scripts -p "test_build_site_data.py"
      - name: Install test dependencies (no lifecycle scripts)
        working-directory: tests/site
        run: npm ci --ignore-scripts
      - name: Install Playwright browser
        working-directory: tests/site
        run: npx playwright install --with-deps chromium
      - name: Run site smoke tests
        working-directory: tests/site
        run: npm test
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
