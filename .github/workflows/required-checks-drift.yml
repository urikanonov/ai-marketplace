name: required-checks-drift

# Detects drift between .github/required-checks.json (the code-reviewed source of truth) and the
# live required status checks on main. Reading branch protection needs admin, which the default
# GITHUB_TOKEN lacks, so without an admin-scoped BRANCH_PROTECTION_TOKEN secret the run degrades to
# a neutral skip (green + a notice). Not a pull_request workflow, so it never runs PR-authored code.

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Compare committed required-checks list against live branch protection
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN || github.token }}
          HAS_ADMIN_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN != '' }}
        run: |
          set +e
          python scripts/check_required_checks.py
          rc=$?
          if [ "$rc" = "2" ]; then
            if [ "$HAS_ADMIN_TOKEN" = "true" ]; then
              echo "::error::A BRANCH_PROTECTION_TOKEN is configured but branch protection could not be read (token expired or under-scoped). Drift monitoring is broken - fix the token."
              exit 1
            fi
            echo "::notice::Could not read live branch protection (no admin token). Set a repository secret BRANCH_PROTECTION_TOKEN with admin read to enable drift detection."
            exit 0
          fi
          exit "$rc"
