name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install validator dependencies
        run: python -m pip install --disable-pip-version-check jsonschema pyyaml
      - name: Validate marketplace manifest, plugins, and skills
        run: python scripts/validate_marketplace.py
      - name: Run script tests
        run: python -m unittest discover -s scripts -p "test_*.py"
      - name: Validate Markdown files
        run: python scripts/validate_markdown.py
      - name: Block secret-bearing files (.env, private keys, keystores)
        run: python scripts/check_forbidden_files.py
      - name: Validate plugin changelog sync
        run: python scripts/check_changelog_sync.py

  version-bump:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Require a version bump when a plugin's shipped source changed
        env:
          BUMP_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          BUMP_HEAD_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          BUMP_EVENT: ${{ github.event_name }}
        run: python scripts/check_version_bump.py

  build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Verify commentable-html generated files are in sync with the layer source
        run: >-
          python plugins/commentable-html/dev/tools/build.py
          --assets-dir plugins/commentable-html/dev/assets
          --out-dir plugins/commentable-html/pkg/skills/commentable-html --check
