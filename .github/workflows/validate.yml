name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install validator dependencies
        run: python -m pip install --disable-pip-version-check jsonschema pyyaml
      - name: Validate marketplace manifest, plugins, and skills
        run: python scripts/validate_marketplace.py
      - name: Verify vendored frontend-slides subtree is pristine
        run: python plugins/commentable-html/dev/tools/check_vendor.py
      - name: Verify deck theme presets acknowledge the vendored commit (staleness gate)
        run: python plugins/commentable-html/dev/tools/check_theme_sources.py
      - name: Run script tests
        run: python -m unittest discover -s scripts -p "test_*.py"
      - name: Validate Markdown files
        run: python scripts/validate_markdown.py
      - name: Block secret-bearing files (.env, private keys, keystores)
        run: python scripts/check_forbidden_files.py
      - name: Block Backlog.md artifacts
        run: python scripts/check_no_backlog.py
      - name: Validate plugin changelog sync
        run: python scripts/check_changelog_sync.py
      - name: Enforce CI trust-boundary invariants (pull_request_target / secrets / actionlint ignore)
        run: python scripts/check_workflow_policy.py

  cross-platform:
    name: cross-platform (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install validator dependencies
        run: python -m pip install --disable-pip-version-check jsonschema pyyaml
      - name: Validate marketplace manifest, plugins, and skills
        run: python scripts/validate_marketplace.py
      - name: Validate Markdown files
        run: python scripts/validate_markdown.py
      - name: Block Backlog.md artifacts
        run: python scripts/check_no_backlog.py
      - name: Run script tests
        run: python -m unittest discover -s scripts -p "test_*.py"

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Scan repository content with Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_CONFIG: .github/gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_VERSION: "8.30.1"

  version-bump:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Require a version bump when a plugin's shipped source changed
        env:
          BUMP_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          BUMP_HEAD_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          BUMP_EVENT: ${{ github.event_name }}
        run: python scripts/check_version_bump.py

  dependency-cooldown:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Enforce npm dependency publish cooldown
        env:
          COOLDOWN_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          COOLDOWN_HEAD_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          COOLDOWN_EVENT: ${{ github.event_name }}
        run: python scripts/check_dependency_cooldown.py

  dist-in-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Verify commentable-html generated files and fixtures are in sync with the layer source
        run: >-
          python plugins/commentable-html/dev/tools/build.py
          --assets-dir plugins/commentable-html/dev/assets
          --out-dir plugins/commentable-html/pkg/skills/commentable-html --check --check-fixtures
      - name: Verify commentable-html SPEC.md is in sync with spec partials
        run: python plugins/commentable-html/dev/tools/build_spec.py --check

  # Lints every GitHub Actions workflow on each PR, so a broken workflow definition (bad expression,
  # undefined `needs`/context, shell mistake) is caught before it can fail a run on main - closing the
  # gap that the main-only pages deploy/notify jobs are never exercised on a PR.
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint workflows with actionlint
        shell: bash
        env:
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
        run: |
          set -euo pipefail
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -sSL -o actionlint.tar.gz "$url"
          echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum -c -
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint -color

  # Defense-in-depth GitHub Actions security linter, complementing the required actionlint and the
  # scripts/check_workflow_policy.py trust-boundary gate. Advisory: NOT in required-checks.json, so a
  # new dangerous pattern surfaces as a red check without blocking merges (the injection/trust
  # invariants are already blocked by the required validate job). Runs offline (no token, no secrets)
  # so it stays a clean pull_request job. The two audited-safe pull_request_target workflows carry
  # inline `# zizmor: ignore[dangerous-triggers]` justifications; a NEW pull_request_target would fail.
  zizmor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install zizmor (pinned; Dependabot keeps it current)
        run: python -m pip install --disable-pip-version-check "zizmor==1.26.1"
      - name: Lint workflows with zizmor (offline, no token)
        run: zizmor --offline .github/workflows

  # Advisory early warning for finding 4.5: if this PR bumps commentable-html to a version another
  # open PR already claimed, flag it now so the author picks a distinct lane and avoids re-bump churn.
  # Not required (the version state of other open PRs is non-deterministic); the required version-bump
  # gate still blocks the actual collision at merge time. Keeps permissions at contents: read - the
  # script gracefully SKIPS (green) if it cannot list open PRs, so no widened token is needed.
  version-lane:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Warn on a colliding commentable-html version lane across open PRs
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_LANE_BASE: ${{ github.event.pull_request.base.sha }}
          VERSION_LANE_SELF: ${{ github.event.pull_request.number }}
          VERSION_LANE_REPO: ${{ github.repository }}
        run: python scripts/check_version_lane.py
