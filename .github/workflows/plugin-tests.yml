name: plugin-tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      plugins: ${{ steps.find.outputs.plugins }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Discover plugin test suites
        id: find
        shell: bash
        run: |
          set -euo pipefail
          # A plugin has a Node/Playwright suite when plugins/<plugin>/dev/package.json exists.
          plugins=$(find plugins -mindepth 3 -maxdepth 3 -type f -path 'plugins/*/dev/package.json' \
            -printf '%h\n' | sed 's:/dev$::' | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0 and test("^plugins/[A-Za-z0-9._-]+$")))')
          {
            echo 'plugins<<__EOF__'
            echo "$plugins"
            echo '__EOF__'
          } >> "$GITHUB_OUTPUT"
          echo "Discovered plugin test suites: $plugins"

  # Decide whether this event needs the heavy plugin suites. On a push to main we always
  # run them; on a PR we run them only when a file that can affect a plugin suite changed
  # (any plugins/** file, this workflow, or the shared Python test runner). A docs-only,
  # site-only, or scripts-only PR then skips the ~6-7 min Playwright + Python suites, while
  # the required `plugin-tests` gate below still reports (it treats the intentional skip as
  # success). Fails SAFE: if the diff cannot be computed, it runs the suites.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_plugin: ${{ steps.filter.outputs.run_plugin }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Decide whether to run the plugin suites
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "run_plugin=true" >> "$GITHUB_OUTPUT"
            echo "Not a pull_request event; running the plugin suites."
            exit 0
          fi
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null || ! git cat-file -e "$HEAD_SHA" 2>/dev/null; then
            echo "run_plugin=true" >> "$GITHUB_OUTPUT"
            echo "Could not resolve the PR base/head; running the plugin suites (fail-safe)."
            exit 0
          fi
          changed=$(git diff --name-only "$BASE_SHA...$HEAD_SHA") || {
            echo "run_plugin=true" >> "$GITHUB_OUTPUT"
            echo "git diff failed; running the plugin suites (fail-safe)."
            exit 0
          }
          echo "Changed files:"; echo "$changed"
          if echo "$changed" | grep -Eq '^(plugins/|\.github/workflows/plugin-tests\.yml$|scripts/run_plugin_python_tests\.py$)'; then
            echo "run_plugin=true" >> "$GITHUB_OUTPUT"
            echo "A plugin-affecting file changed; running the plugin suites."
          else
            echo "run_plugin=false" >> "$GITHUB_OUTPUT"
            echo "No plugin-affecting file changed; skipping the plugin suites."
          fi

  playwright:
    needs: [changes, discover]
    if: ${{ needs.changes.outputs.run_plugin == 'true' && needs.discover.outputs.plugins != '[]' && needs.discover.outputs.plugins != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      # Shard each plugin's Playwright suite across runners. A GitHub-hosted ubuntu runner
      # has 4 vCPUs, so `workers` cannot go past 4 on one runner (and the specs spawn a
      # python subprocess that thrashes beyond that); fanning the suite out across shards is
      # the lever that cuts the critical path. The shard is a single "index/total" string so
      # the count lives in ONE place - dropping an entry cannot silently orphan tests.
      matrix:
        plugin: ${{ fromJSON(needs.discover.outputs.plugins) }}
        shard: ["1/4", "2/4", "3/4", "4/4"]
    env:
      SHARD: ${{ matrix.shard }}
    defaults:
      run:
        working-directory: ${{ matrix.plugin }}/dev
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.plugin }}/dev/package-lock.json
      - name: Verify committed lockfile
        run: test -f package-lock.json || { echo "::error::this plugin's dev/ needs a committed package-lock.json for npm ci"; exit 1; }
      - name: Install dependencies (no lifecycle scripts)
        run: npm ci --ignore-scripts
      - name: Verify committed test fixtures
        if: matrix.plugin == 'plugins/commentable-html' && matrix.shard == '1/4'
        working-directory: .
        run: node plugins/commentable-html/dev/tests/fixtures/generate.mjs --check
      - name: Resolve Playwright cache key inputs
        id: pw
        shell: bash
        run: |
          set -euo pipefail
          node -e 'process.stdout.write("version=" + require("@playwright/test/package.json").version + "\n")' >> "$GITHUB_OUTPUT"
          echo "imageos=${ImageOS:-$RUNNER_OS}" >> "$GITHUB_OUTPUT"
      - name: Restore Playwright browser cache
        id: pwcache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw.outputs.imageos }}-${{ runner.arch }}-chromium-${{ steps.pw.outputs.version }}
      # On a cache MISS install the browser plus its apt system deps; on a HIT the browser is
      # already restored, so install it without `--with-deps` to skip the ~18s apt step (the
      # ubuntu-latest image ships the shared libraries chromium needs).
      - name: Install Playwright browser and system deps (cache miss)
        if: steps.pwcache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright browser (cache hit)
        if: steps.pwcache.outputs.cache-hit == 'true'
        run: npx playwright install chromium
      - name: Save Playwright browser cache
        if: steps.pwcache.outputs.cache-hit != 'true' && matrix.shard == '1/4'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw.outputs.imageos }}-${{ runner.arch }}-chromium-${{ steps.pw.outputs.version }}
      # The tutorial-screenshot check is not shardable, so run it once (on shard 1 of the
      # commentable-html suite that owns it) instead of in every shard.
      - name: Verify tutorial screenshots (once)
        if: matrix.plugin == 'plugins/commentable-html' && matrix.shard == '1/4'
        run: npm run shots:check
      - name: Run Playwright tests (shard)
        run: npx playwright test "--shard=${SHARD}"

  python:
    needs: changes
    if: ${{ needs.changes.outputs.run_plugin == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      # Shard the plugins' Python (unittest) suites across runners the same way. The runner
      # keeps the per-file, in-process execution model of `unittest discover`, so no new
      # shared-state parallelism is introduced; different files just run on different runners.
      # The shard is a single "index/total" string (one source of truth for the count).
      matrix:
        shard: ["1/3", "2/3", "3/3"]
    env:
      SHARD: ${{ matrix.shard }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Run plugin Python test suites (shard)
        run: python scripts/run_plugin_python_tests.py "--shard=${SHARD}" --require-discovered

  plugin-tests:
    needs: [changes, discover, playwright, python]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Gate on plugin test results
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          RUN_PLUGIN: ${{ needs.changes.outputs.run_plugin }}
          DISCOVER_RESULT: ${{ needs.discover.result }}
          PLAYWRIGHT_RESULT: ${{ needs.playwright.result }}
          PYTHON_RESULT: ${{ needs.python.result }}
          DISCOVERED: ${{ needs.discover.outputs.plugins }}
        run: |
          echo "changes=$CHANGES_RESULT run_plugin=$RUN_PLUGIN discover=$DISCOVER_RESULT playwright=$PLAYWRIGHT_RESULT python=$PYTHON_RESULT plugins=$DISCOVERED"
          # The discovery guard runs regardless, so an accidentally removed suite still fails
          # the gate even on a PR that skips the heavy suites.
          if [ "$DISCOVER_RESULT" != "success" ]; then
            echo "::error::plugin discovery failed"
            exit 1
          fi
          if [ -z "$DISCOVERED" ] || [ "$DISCOVERED" = "[]" ]; then
            echo "::error::no plugin test suites were discovered; expected at least one plugins/*/dev/package.json"
            exit 1
          fi
          # Fail CLOSED if the changes job did not succeed, or produced an unexpected value:
          # only an explicit run_plugin=false is a legitimate skip. Otherwise a failed/timed-out
          # changes job (empty output) could silently skip the suites and still report green.
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "::error::changes job did not succeed (result: $CHANGES_RESULT); cannot trust the skip decision"
            exit 1
          fi
          if [ "$RUN_PLUGIN" != "true" ] && [ "$RUN_PLUGIN" != "false" ]; then
            echo "::error::unexpected run_plugin value: '$RUN_PLUGIN' (expected true or false)"
            exit 1
          fi
          if [ "$RUN_PLUGIN" = "false" ]; then
            echo "No plugin-affecting change; the Playwright and Python suites were intentionally skipped."
            exit 0
          fi
          if [ "$PLAYWRIGHT_RESULT" != "success" ]; then
            echo "::error::plugin Playwright tests did not pass (result: $PLAYWRIGHT_RESULT)"
            exit 1
          fi
          if [ "$PYTHON_RESULT" != "success" ]; then
            echo "::error::plugin Python tests did not pass (result: $PYTHON_RESULT)"
            exit 1
          fi
