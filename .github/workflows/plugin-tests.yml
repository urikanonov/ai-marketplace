name: plugin-tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.find.outputs.plugins }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Discover plugin test suites
        id: find
        shell: bash
        run: |
          # A plugin has a Node/Playwright suite when plugins/<plugin>/dev/package.json exists.
          plugins=$(find plugins -mindepth 2 -maxdepth 3 -type f -path '*/dev/package.json' \
            -exec dirname {} \; | sed 's|/dev$||' | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "plugins=$plugins" >> "$GITHUB_OUTPUT"
          echo "Discovered plugin test suites: $plugins"

  playwright:
    needs: discover
    if: ${{ needs.discover.outputs.plugins != '[]' && needs.discover.outputs.plugins != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJSON(needs.discover.outputs.plugins) }}
    defaults:
      run:
        working-directory: ${{ matrix.plugin }}/dev
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.plugin }}/dev/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npm test
