name: request-copilot-review

# Requests a Copilot code review on every non-draft PR (an advisory second opinion).
# It uses pull_request_target so it has a write-scoped token to request a reviewer on
# fork PRs, but it NEVER checks out or runs PR code - it only calls the REST API with
# the PR number, so no untrusted code executes. It is best-effort and never blocks the PR.
#
# The Copilot PR-review bot is requested via the REST requested_reviewers endpoint with
# the login "copilot-pull-request-reviewer[bot]"; the GraphQL suggestedActors list does
# not surface that reviewer, so the REST call is the reliable path.

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: request-copilot-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  request:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Request a Copilot code review (best effort, non-blocking)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -uo pipefail
          if resp="$(printf '%s' '{"reviewers":["copilot-pull-request-reviewer[bot]"]}' \
            | gh api --method POST "repos/$REPO/pulls/$PR_NUMBER/requested_reviewers" --input - 2>&1)"; then
            echo "Requested a Copilot review on PR #$PR_NUMBER."
          else
            echo "Copilot review not requested (unavailable on this plan, or already requested); continuing without failing the PR. Detail: $resp"
          fi
