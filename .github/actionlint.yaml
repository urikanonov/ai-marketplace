# actionlint configuration.
#
# The pinned actionlint (v1.7.12, run by the actionlint CI job) does not yet know
# the `pull_request_review_thread` webhook event, so it reports it as an unknown
# event. The event is valid and load-bearing for require-resolved-conversations.yml
# (it re-evaluates the "All conversations resolved" check the moment a thread is
# resolved or unresolved), so ignore only that specific false positive on that file.
paths:
  .github/workflows/require-resolved-conversations.yml:
    ignore:
      - 'unknown Webhook event "pull_request_review_thread"'
