title = "ai-marketplace secret scanning"

[extend]
useDefault = true

# commentable-html generated documents (example reports, dist templates, the docs playbook, site
# demos) carry a data-comment-key: a high-entropy hash derived from the document label/source, not a
# credential. The default generic-api-key rule flags it. Allowlist the line that declares it so the
# scan does not false-positive on the repo's own self-contained review artifacts.
[allowlist]
description = "commentable-html data-comment-key is a document identity hash, not a secret"
regexTarget = "line"
regexes = [
  '''data-comment-key\s*=\s*["'][^"']+["']''',
]
