<span class="cmh-code-com">#!/usr/bin/env bash</span>
set <span class="cmh-code-op">-</span>euo pipefail

<span class="cmh-code-com"># Count lines in each tracked file</span>
total<span class="cmh-code-op">=</span><span class="cmh-code-num">0</span>
<span class="cmh-code-kw">for</span> file <span class="cmh-code-kw">in</span> <span class="cmh-code-fn">$</span><span class="cmh-code-op">(</span>git ls<span class="cmh-code-op">-</span>files<span class="cmh-code-op">);</span> <span class="cmh-code-kw">do</span>
  lines<span class="cmh-code-op">=</span><span class="cmh-code-fn">$</span><span class="cmh-code-op">(</span>wc <span class="cmh-code-op">-</span>l <span class="cmh-code-op">&lt;</span> <span class="cmh-code-str">"$file"</span><span class="cmh-code-op">)</span>
  echo <span class="cmh-code-str">"$file: $lines"</span>
  total<span class="cmh-code-op">=</span><span class="cmh-code-fn">$</span><span class="cmh-code-op">((</span>total <span class="cmh-code-op">+</span> lines<span class="cmh-code-op">))</span>
<span class="cmh-code-kw">done</span>

echo <span class="cmh-code-str">"total lines: $total"</span>
