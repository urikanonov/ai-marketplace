<span class="cmh-code-com">// Sum a list of numbers</span>
<span class="cmh-code-kw">def</span> <span class="cmh-code-fn">total</span><span class="cmh-code-op">(</span>List<span class="cmh-code-op">&lt;</span>Integer<span class="cmh-code-op">&gt;</span> values<span class="cmh-code-op">)</span> <span class="cmh-code-op">{</span>
    <span class="cmh-code-kw">int</span> sum <span class="cmh-code-op">=</span> <span class="cmh-code-num">0</span>
    <span class="cmh-code-kw">for</span> <span class="cmh-code-op">(</span>v <span class="cmh-code-kw">in</span> values<span class="cmh-code-op">)</span> <span class="cmh-code-op">{</span>
        sum <span class="cmh-code-op">+=</span> v
    <span class="cmh-code-op">}</span>
    <span class="cmh-code-kw">return</span> sum
<span class="cmh-code-op">}</span>

<span class="cmh-code-kw">def</span> numbers <span class="cmh-code-op">=</span> <span class="cmh-code-op">[</span><span class="cmh-code-num">1</span><span class="cmh-code-op">,</span> <span class="cmh-code-num">2</span><span class="cmh-code-op">,</span> <span class="cmh-code-num">3</span><span class="cmh-code-op">]</span>
<span class="cmh-code-com">/* prints 6 */</span>
println <span class="cmh-code-str">"total = ${total(numbers)}"</span>
