<span class="cmh-code-com">-- Top customers by revenue</span>
<span class="cmh-code-kw">SELECT</span> c<span class="cmh-code-op">.</span>id<span class="cmh-code-op">,</span> c<span class="cmh-code-op">.</span>name<span class="cmh-code-op">,</span> <span class="cmh-code-fn">SUM</span><span class="cmh-code-op">(</span>o<span class="cmh-code-op">.</span>amount<span class="cmh-code-op">)</span> <span class="cmh-code-kw">AS</span> revenue
<span class="cmh-code-kw">FROM</span> customers <span class="cmh-code-kw">AS</span> c
<span class="cmh-code-kw">INNER</span> <span class="cmh-code-kw">JOIN</span> orders <span class="cmh-code-kw">AS</span> o <span class="cmh-code-kw">ON</span> o<span class="cmh-code-op">.</span>customer_id <span class="cmh-code-op">=</span> c<span class="cmh-code-op">.</span>id
<span class="cmh-code-kw">WHERE</span> o<span class="cmh-code-op">.</span>status <span class="cmh-code-op">=</span> <span class="cmh-code-str">'paid'</span>
<span class="cmh-code-kw">GROUP</span> <span class="cmh-code-kw">BY</span> c<span class="cmh-code-op">.</span>id<span class="cmh-code-op">,</span> c<span class="cmh-code-op">.</span>name
<span class="cmh-code-kw">HAVING</span> <span class="cmh-code-fn">SUM</span><span class="cmh-code-op">(</span>o<span class="cmh-code-op">.</span>amount<span class="cmh-code-op">)</span> <span class="cmh-code-op">&gt;</span> <span class="cmh-code-num">1000</span>
<span class="cmh-code-kw">ORDER</span> <span class="cmh-code-kw">BY</span> revenue <span class="cmh-code-kw">DESC</span>
<span class="cmh-code-kw">LIMIT</span> <span class="cmh-code-num">10</span><span class="cmh-code-op">;</span>
<span class="cmh-code-com">/* revenue is in cents */</span>
