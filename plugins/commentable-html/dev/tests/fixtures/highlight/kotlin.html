<span class="cmh-code-com">// Greeting helper</span>

<span class="cmh-code-op">}</span>

    <span class="cmh-code-kw">val</span> count <span class="cmh-code-op">=</span> <span class="cmh-code-num">42</span>
    <span class="cmh-code-fn">println</span><span class="cmh-code-op">(</span><span class="cmh-code-str">"count = $count"</span><span class="cmh-code-op">)</span>
<span class="cmh-code-op">}</span>
