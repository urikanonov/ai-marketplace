<span class="cmh-code-com"># Simple stack implementation</span>
<span class="cmh-code-kw">class</span> Stack

    @items <span class="cmh-code-op">=</span> <span class="cmh-code-op">[]</span>
  <span class="cmh-code-kw">end</span>

  <span class="cmh-code-kw">def</span> <span class="cmh-code-fn">push</span><span class="cmh-code-op">(</span>value<span class="cmh-code-op">)</span>

<span class="cmh-code-kw">end</span>
