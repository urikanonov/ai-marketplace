<!doctype html>
<html>
<head><meta charset="utf-8"><title>oracle empty mermaid host</title></head>
<body>
<!-- An empty (whitespace-only) mermaid host renders as mermaid's
     "No diagram type detected" error bomb, so the oracle must extract it and
     flag it rather than silently skipping it. A valid diagram sits beside it so
     the count and the "one bad, one good" outcome are both exercised. -->
<pre class="mermaid">sequenceDiagram
  A->>B: hello
  B->>A: hi</pre>

<pre class="mermaid">   </pre>
</body>
</html>
