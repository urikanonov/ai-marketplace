<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Community garden layout</title>
  <desc id="desc">A labeled top-down plan with raised beds, paths, compost, rain barrel, seating, and pollinator flowers.</desc>
  <rect x="20" y="20" width="600" height="380" rx="18" fill="#eef7e8" stroke="#5f7f52" stroke-width="4"/>
  <rect x="295" y="55" width="50" height="290" fill="#d9c7a3" stroke="#9a7a45" stroke-width="2"/>
  <text x="320" y="205" text-anchor="middle" font-family="Arial" font-size="14" fill="#5b4528" transform="rotate(-90 320 205)">Central path</text>
  <g font-family="Arial" font-size="14" fill="#1f3d1f" text-anchor="middle">
    <rect x="70" y="60" width="160" height="55" rx="8" fill="#b7df9b" stroke="#4f7d39"/><text x="150" y="93">Bed 1 Lettuce</text>
    <rect x="70" y="135" width="160" height="55" rx="8" fill="#b7df9b" stroke="#4f7d39"/><text x="150" y="168">Bed 2 Peas</text>
    <rect x="70" y="210" width="160" height="55" rx="8" fill="#b7df9b" stroke="#4f7d39"/><text x="150" y="243">Bed 3 Tomatoes</text>
    <rect x="70" y="285" width="160" height="55" rx="8" fill="#b7df9b" stroke="#4f7d39"/><text x="150" y="318">Bed 4 Peppers</text>
    <rect x="410" y="60" width="160" height="55" rx="8" fill="#b7df9b" stroke="#4f7d39"/><text x="490" y="93">Bed 5 Roots</text>
    <rect x="410" y="135" width="160" height="55" rx="8" fill="#b7df9b" stroke="#4f7d39"/><text x="490" y="168">Bed 6 Zucchini</text>
    <rect x="410" y="210" width="160" height="55" rx="8" fill="#b7df9b" stroke="#4f7d39"/><text x="490" y="243">Bed 7 Greens</text>
    <rect x="410" y="285" width="160" height="55" rx="8" fill="#b7df9b" stroke="#4f7d39"/><text x="490" y="318">Bed 8 Choice</text>
  </g>
  <rect x="55" y="355" width="240" height="24" rx="12" fill="#f7d36b" stroke="#b28a19"/><text x="175" y="373" text-anchor="middle" font-family="Arial" font-size="13">Herb and pollinator strip</text>
  <circle cx="385" cy="360" r="18" fill="#6bb7d6" stroke="#2b6f8a"/><text x="385" y="394" text-anchor="middle" font-family="Arial" font-size="12">Rain barrel</text>
  <rect x="520" y="350" width="60" height="30" rx="5" fill="#9b7653"/><text x="550" y="394" text-anchor="middle" font-family="Arial" font-size="12">Compost</text>
</svg>
